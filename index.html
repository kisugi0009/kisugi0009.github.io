<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>67 Virginis, 13h 25m 11.58s, −11° 09′ 40.8″</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f4f6f3;
    --surface: #ffffff;
    --text-primary: #1e2e20;
    --text-secondary: #5a7060;
    --text-muted: #9ab09e;
    --border: #cfdece;
    --accent: #2d4a32;
    --accent-light: #e4ede5;
    --tag-bg: #e8efe8;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.7;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 120px;
  }

  .page {
    width: 100%;
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 2.5rem;
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 0 3.5rem;
    align-items: start;
  }

  .avatar {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--border);
    margin-bottom: 1.4rem;
    display: block;
  }

  /* ── 左欄 ── */
  .col-left {
    position: sticky;
    top: 3rem;
    min-width: 0;
    width: 240px;
  }

  .col-right {
    min-width: 0;
  }

  .name {
    font-family: 'Noto Serif TC', serif;
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--accent);
  }

  .divider {
    width: 28px;
    height: 2px;
    background: var(--accent);
    margin: 1.4rem 0;
    border-radius: 2px;
  }

  .bio {
    font-size: 0.9rem;
    color: var(--text-secondary);
    line-height: 1.9;
  }

  .social {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 2rem;
  }

  .social-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.84rem;
    color: var(--text-secondary);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    background: var(--surface);
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    width: fit-content;
  }

  .social-link:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }

  .social-link svg {
    width: 15px;
    height: 15px;
    flex-shrink: 0;
  }

  /* ── 右欄 ── */
  .col-right {
    display: flex;
    flex-direction: column;
    gap: 2.6rem;
  }

  .section-title {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-weight: 500;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    background: var(--tag-bg);
    border: none;
    color: var(--text-secondary);
    font-size: 0.84rem;
    padding: 5px 14px;
    border-radius: 999px;
  }

  .tag.special {
    background: var(--accent-light);
    color: var(--accent);
  }

  /* Tools */
  .tools {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px 1rem;
  }

  .tool-item {
    display: flex;
    align-items: center;
    padding: 0.55rem 0.9rem;
    text-decoration: none;
    color: var(--text-primary);
    border-left: 2px solid var(--border);
    transition: border-color 0.15s, color 0.15s;
  }

  .tool-item:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tool-name {
    font-size: 0.82rem;
    font-weight: 500;
  }

  /* ── RWD ── */
  @media (max-width: 640px) {
    body {
      align-items: flex-start;
    }

    .page {
      grid-template-columns: 1fr;
      padding: 3rem 1.4rem 4rem;
      gap: 2.4rem;
    }

    .col-left {
      position: static;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      margin-bottom: 1rem;
    }

    .divider {
      margin: 1rem auto;
    }

    .bio {
      max-width: 280px;
    }

    .social {
      flex-direction: row;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1.4rem;
    }

    .col-right {
      gap: 2rem;
    }

    .tools .tool-item {
      padding: 1rem 1.2rem;
    }

    .name { font-size: 1.9rem; }
  }
</style>
</head>

.cat_outer_wrapper {

.cat_wrapper {

}
.cat {
  position: absolute;
  bottom: 0;
  left: 100px;
  height: 30px;

  transform-origin: center;
  background-color: transparent;
}
.cat_body {

.face_right .cat_body { animation: cat_body_turn forwards 0.5s; }

  50%     { transform: scale(0.5,1); }

}
.first_pose .cat_head,
.face_left  .cat_head { right: 22px; }
.cat_tail {
  position: absolute;
  top: -25px; height: 36px; width: 15px;
  animation: cat_tail_r 2s forwards infinite;
  transform-origin: bottom right;
}
@keyframes cat_tail_r {
  0%,100% { left:-5px;  transform: rotate(0deg) scale(1);     }
  50%     { left:-10px; transform: rotate(-50deg) scale(-1,1); }
}
.first_pose .cat_tail,
.face_left  .cat_tail {
  left: 45px;
  animation: cat_tail_l 2s forwards infinite;
}
@keyframes cat_tail_l {
  0%,100% { left:45px; transform: rotate(0deg) scale(1);    }
  50%     { left:40px; transform: rotate(50deg) scale(-1,1); }
}
.cat_outer_wrapper .leg {
  position: absolute;
  height: 20px; width: 10px;
  transform-origin: top center;
}
.front_legs, .back_legs {
  position: absolute; height: 30px; transition: 0.7s;
}
.front_legs { width: 30px; right: 0; }
.back_legs  { width: 25px; left: 0; }
.face_left .cat_outer_wrapper .leg svg { transform: scale(-1,1); }
.face_right .front_legs { right: 0; }
.first_pose .front_legs,
.face_left  .front_legs { right: 30px; }
.face_right .back_legs  { left: 0; }
.first_pose .back_legs,
.face_left  .back_legs  { left: 35px; }
.one, .three { bottom: -15px; right: 0; }
.two, .four  { bottom: -15px; left: 0; }
.one.walk, .three.walk { animation: cat_walk     0.3s infinite; }
.two.walk, .four.walk  { animation: cat_walk_alt 0.3s infinite; }
@keyframes cat_walk     { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)}  }
@keyframes cat_walk_alt { 0%,100%{transform:rotate(10deg)}  50%{transform:rotate(-10deg)} }
.cat_outer_wrapper svg  { height:100%; width:100%; }
.cat_eyes { fill: var(--border); }
.cat_outer_wrapper polygon,
.cat_outer_wrapper path { fill: #7a9e7e; }
</style>

<script>
(function(){
  const wrapperInner = document.querySelector('.wrapper_inner');
  const cat  = document.querySelector('.cat');
  const head = document.querySelector('.cat_head');
  const legs = document.querySelectorAll('.cat_outer_wrapper .leg');
  const pos  = { x: null, y: null };

  const walk = () => {
    cat.classList.remove('first_pose');
    legs.forEach(l => l.classList.add('walk'));
  };
  const turnRight = () => {
    cat.style.left = `${pos.x - 90}px`;
    cat.classList.remove('face_left');
    cat.classList.add('face_right');
  };
  const turnLeft = () => {
    cat.style.left = `${pos.x + 10}px`;
    cat.classList.remove('face_right');
    cat.classList.add('face_left');
  };
  const decideTurn = () => {
    cat.getBoundingClientRect().x < pos.x ? turnRight() : turnLeft();
  };
  const headMotion = () => {
    // 只有滑鼠非常靠近底部才低頭，預設保持抬頭
    head.style.top = pos.y > (window.innerHeight - 80) ? '-15px' : '-30px';
  };
  const decideStop = () => {
    if ((cat.classList.contains('face_right') && pos.x - 90 === cat.offsetLeft) ||
        (cat.classList.contains('face_left')  && pos.x + 10 === cat.offsetLeft)) {
      legs.forEach(l => l.classList.remove('walk'));
    }
  };

  document.addEventListener('mousemove', e => {
    pos.x = e.clientX; pos.y = e.clientY; walk();
  });
  setInterval(() => {
    if (!pos.x || !pos.y) return;
    decideTurn(); headMotion(); decideStop();
  }, 100);
})();
</script>

</body>
</html>
